name: Publish

on:
  push:
    branches: [ main ]
    paths:
      - 'lib-core/**'
      - 'lib-compiler/**'
      - 'build-logic/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'gradle-public.properties'
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Stage public publishing metadata
        run: cp gradle-public.properties gradle.properties

      - name: Run tests
        run: ./gradlew :lib-core:test :lib-compiler:test

      - name: Verify publish secrets are present
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          missing=0
          check() {
            local val="${!1}"
            if [ -z "$val" ]; then
              echo "::error::Secret $1 is missing or empty"
              missing=1
            else
              echo "OK $1 — length=${#val}"
            fi
          }
          check MAVEN_CENTRAL_USERNAME
          check MAVEN_CENTRAL_PASSWORD
          check SIGNING_KEY_ID
          check SIGNING_KEY_PASSWORD
          check SIGNING_KEY
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "SIGNING_KEY first 36 chars: $(printf '%s' "$SIGNING_KEY" | head -c 36)"

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^VERSION_NAME=' gradle-public.properties | cut -d= -f2)
          echo "name=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }}
          generate_release_notes: true